name: Tests

on:
  push:
    branches:
      - "main"
      - "master"
    paths:
      - "bucket/**"
      - "deprecated/**"
      - "bin/**"
      - "Scoop-Bucket.Tests.ps1"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "bucket/**"
      - "deprecated/**"
      - "bin/**"
      - "Scoop-Bucket.Tests.ps1"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  test_powershell:
    name: WindowsPowerShell
    runs-on: windows-latest
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          path: my_bucket
          sparse-checkout: |
            bucket
            deprecated
            bin
            Scoop-Bucket.Tests.ps1
          sparse-checkout-cone-mode: false
      - name: Checkout Scoop
        uses: actions/checkout@v6
        with:
          repository: ScoopInstaller/Scoop
          path: scoop_core
      - name: Init Test Suite
        uses: potatoqualitee/psmodulecache@main
        with:
          modules-to-cache: BuildHelpers
          shell: powershell
      - name: Test Bucket
        shell: powershell
        run: |
          $env:SCOOP_HOME="$(Convert-Path '.\scoop_core')"
          .\my_bucket\bin\test.ps1
  test_pwsh:
    name: PowerShell
    runs-on: windows-latest
    steps:
      - name: Checkout Bucket
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          path: my_bucket
          sparse-checkout: |
            bucket
            deprecated
            bin
            Scoop-Bucket.Tests.ps1
          sparse-checkout-cone-mode: false
      - name: Checkout Scoop
        uses: actions/checkout@v6
        with:
          repository: ScoopInstaller/Scoop
          path: scoop_core
      - name: Init Test Suite
        uses: potatoqualitee/psmodulecache@main
        with:
          modules-to-cache: BuildHelpers
          shell: pwsh
      - name: Test Bucket
        shell: pwsh
        run: |
          $env:SCOOP_HOME="$(Convert-Path '.\scoop_core')"
          .\my_bucket\bin\test.ps1
